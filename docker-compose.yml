services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: job_queue
      POSTGRES_PASSWORD: job_queue
      POSTGRES_DB: job_queue
    ports:
      - "5435:5432"
    volumes:
      - job_queue_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_queue"]
      interval: 2s
      timeout: 2s
      retries: 20

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: job_queue
      POSTGRES_PASSWORD: job_queue
      POSTGRES_DB: job_queue_test
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_queue"]
      interval: 2s
      timeout: 2s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    environment:
      DATABASE_URL: postgres://job_queue:job_queue@postgres:5432/job_queue
      QUEUES: default
      BATCH_SIZE: "10"
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: packages/scheduler/Dockerfile
    environment:
      DATABASE_URL: postgres://job_queue:job_queue@postgres:5432/job_queue
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment:
      DATABASE_URL: postgres://job_queue:job_queue@postgres:5432/job_queue
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  job_queue_pg_data:
