services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: job_queue
      POSTGRES_PASSWORD: job_queue
      POSTGRES_DB: job_queue
    ports:
      - "5435:5432"
    volumes:
      - job_queue_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_queue"]
      interval: 2s
      timeout: 2s
      retries: 20

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: job_queue
      POSTGRES_PASSWORD: job_queue
      POSTGRES_DB: job_queue_test
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_queue"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  job_queue_pg_data:
